<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><circle cx='100' cy='100' r='90' fill='%234b83d1'/><text x='100' y='132' font-family='Arial,sans-serif' font-size='92' font-weight='bold' fill='white' text-anchor='middle'>r</text></svg>"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rememo</title>
    <script>
      // 렌더 전에 테마를 적용해 라이트/다크 전환 시 화면 깜빡임을 막는다.
      (function () {
        try {
          var pref = localStorage.getItem('rememo-theme');
          var effective =
            pref === 'light' || pref === 'dark'
              ? pref
              : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = effective;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/src/main.tsx"></script>
  </body>
</html>
